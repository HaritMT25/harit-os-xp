    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body, #root { width: 100%; height: 100%; overflow: hidden; }
      body { font-family: 'Tahoma', 'Segoe UI', Geneva, Verdana, sans-serif; background: #0a0a1a; }
      #pre-loader { display: flex; align-items: center; justify-content: center; height: 100%; }
      #pre-loader .dot { width: 10px; height: 10px; border-radius: 50%; background: #4fc3f7; margin: 0 3px; animation: plPulse 1.2s ease-in-out infinite; }
      #pre-loader .dot:nth-child(2) { animation-delay: 0.3s; }
      #pre-loader .dot:nth-child(3) { animation-delay: 0.6s; }
      @keyframes plPulse { 0%, 80%, 100% { opacity: 0.3; transform: scale(0.8); } 40% { opacity: 1; transform: scale(1.2); } }
    </style>
  </head>
  <body>
    <div id="root">
      <div id="pre-loader"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
